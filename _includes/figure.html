{%- assign _dim = site.data.image_dims[include.url] -%}
<figure class="image{% if include.variant %}-{{ include.variant }}{% endif %}"><img src="{{ include.url }}" alt="{{ include.description }}"{% if _dim %} width="{{ _dim | split: 'x' | first }}" height="{{ _dim | split: 'x' | last }}"{% endif %}{% if include.lazy %} loading="lazy" decoding="async"{% endif %}>{% if include.description %}<figcaption>{{ include.description }}</figcaption>{% endif %}</figure>

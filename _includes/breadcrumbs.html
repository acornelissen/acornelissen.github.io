<p class="crumbs" aria-label="Breadcrumb">
{%- if include.parent -%}<a href="{{ include.parent_url }}">{{ include.parent }}</a>{%- endif -%}
{%- if include.parent2 -%}<span class="crumbs-sep"> / </span><a href="{{ include.parent2_url }}">{{ include.parent2 }}</a>{%- endif -%}
{%- if include.current -%}<span class="crumbs-sep"> / </span><span>{{ include.current }}</span>{%- endif -%}
</p>

<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {% include head.html %}

  <body>

    <a class="skip-link" href="#main">Skip to content</a>

    {% unless page.url == '/' %}{% include header.html %}{% endunless %}

    <main id="main" class="page-content{% if page.url == '/' %} home-page{% endif %}" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    {% include footer.html %}

  </body>

</html>
